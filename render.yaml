services:
  - type: web
    name: rucloud-api
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi --log-file -
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: False
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com,rucloud.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://rucloud.onrender.com,https://rucloud.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://rucloud.onrender.com,https://rucloud.com
      - key: DATABASE_URL
        fromDatabase:
          name: rucloud-db
          property: connectionString

  - type: web
    name: rucloud-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://rucloud-api.onrender.com

databases:
  - name: rucloud-db
    region: frankfurt
    plan: free
    databaseName: rucloud
    user: rucloud
