<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Bag | ru.Cloud</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .cart-container { padding: 4rem 3rem; display: grid; grid-template-columns: 1.5fr 1fr; gap: 5rem; }
        .cart-items { border-top: 0.5px solid var(--color-border); }
        .cart-item { display: grid; grid-template-columns: 120px 1fr auto; gap: 2rem; padding: 2rem 0; border-bottom: 0.5px solid var(--color-border); }
        .cart-item-img { aspect-ratio: 3/4; background: #f5f5f5; }
        .cart-item-info h3 { font-family: var(--font-serif); font-size: 18px; font-style: italic; margin-bottom: 0.5rem; }
        .cart-item-info p { font-size: 12px; color: #9c8570; margin-bottom: 0.5rem; }
        .cart-item-price { font-size: 14px; color: var(--color-text); }
        
        .cart-summary { background: #f9f9f9; padding: 3rem; height: fit-content; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 1.5rem; font-size: 13px; }
        .summary-total { border-top: 0.5px solid var(--color-border); padding-top: 1.5rem; font-weight: 500; font-size: 16px; }
        .checkout-btn { width: 100%; padding: 20px; background: var(--color-espresso); color: white; text-transform: uppercase; letter-spacing: 3px; font-size: 11px; margin-top: 2rem; }
    </style>
</head>
<body>
    <nav class="rc-nav">
        <div class="rc-logo-wrap">
            <div class="rc-logo-dot"><svg width="18" height="12" viewBox="0 0 30 18"><text x="0" y="14" font-family="Georgia,serif" font-size="13" fill="#f0e6d3" font-style="italic">ru</text></svg></div>
            <a href="../index.html" class="rc-logo-text">ru.Cloud</a>
        </div>
        <div class="rc-nav-right">
            <a href="shop.html" class="rc-nav-icon">Continue Shopping</a>
        </div>
    </nav>

    <header class="page-header">
        <h1 class="page-title">Your Bag</h1>
    </header>

    <main class="cart-container">
        <div class="cart-items">
            <div class="cart-item">
                <div class="cart-item-img"></div>
                <div class="cart-item-info">
                    <h3>Shadow Abaya</h3>
                    <p>Size: Medium</p>
                    <p>Color: Noir</p>
                </div>
                <div class="cart-item-price">240.00 DZD</div>
            </div>
        </div>

        <aside class="cart-summary">
            <h2 class="rc-footer-title">Order Summary</h2>
            <div class="summary-row">
                <span>Subtotal</span>
                <span>240.00 DZD</span>
            </div>
            <div class="summary-row">
                <span>Shipping</span>
                <span>Calculated at next step</span>
            </div>
            <div class="summary-row summary-total">
                <span>Total</span>
                <span>240.00 DZD</span>
            </div>
            <button class="checkout-btn">Proceed to Checkout</button>
        </aside>
    </main>

    <footer class="rc-footer">
        <div class="rc-footer-bottom">
            <div class="rc-footer-copy">© 2026 ru.Cloud.</div>
        </div>
    </footer>
</body>
</html>
